
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drinks Secretos - Forja do Sabor</title>
  <link rel="stylesheet" href="css/impact.css">
</head>
<body>
  <main class="hero">
    <img src="assets/hero-drink.jpg" alt="Drink misterioso" class="hero-img">
    <div class="hero-text">
      <h1><span id="typewriter"></span><span class="cursor">|</span></h1>
      <p class="sub">O sabor que despertará seus sentidos está mais próximo do que imagina.</p>
      <div id="countdown" class="countdown"></div>
      <form class="subscribe">
        <input type="email" placeholder="Receba o convite antecipado" required>
        <button type="submit">Quero Ser o Primeiro</button>
      </form>
    </div>
  </main>
  <script>
    const text = "SECRETO. INTENSO. FORJADO.";
    let index = 0;
    function typeWriter() {
      if (index < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, 90);
      }
    }
    typeWriter();
    const countdown = document.getElementById("countdown");
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 7);
    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;
      if (diff <= 0) {
        countdown.innerHTML = "✨ Já disponível!";
        return;
      }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      countdown.innerHTML = `⏳ Faltam ${days}d ${hours}h ${minutes}min`;
    }
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
